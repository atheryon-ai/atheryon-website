name: Deploy to Test Environment

# Deploys to Azure Static Web Apps TEST environment
# URL: https://polite-flower-03ba3020f.7.azurestaticapps.net
# Resource: atheryon-website-test (rg-atheryon-test) on Microsoft Azure Sponsorship sub
#
# Production lives on the icy-tree SWA via www.atheryon.com.au, deployed
# only by deploy-production.yml on main pushes. This workflow is now
# isolated — dev pushes deploy to the test SWA only, not production.

on:
  push:
    branches:
      - dev
      - test
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - dev

env:
  NODE_VERSION: '20'

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy to Test
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          COMMIT_SHA: ${{ github.sha }}

      - name: Copy staticwebapp.config.json to output
        run: cp staticwebapp.config.json out/

      - name: Deploy to Azure Static Web Apps (Test)
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9  # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "out"
          output_location: ""
          skip_app_build: true
          production_branch: "dev"

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9  # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
          action: "close"
