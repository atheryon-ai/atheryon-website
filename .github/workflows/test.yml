name: Playwright tests

# Runs the Playwright chromium suite on every PR into main OR dev, plus pushes
# to main. This is the guardrail that catches test rot after content / IA
# changes — the class of regression that produced PR #42's "Download the pack"
# CTA gap and PR #59's /reality canonicalization breaking pillars.spec.ts.
#
# Why PR-into-dev gating: dev is the integration branch and 95% of changes
# land there first. Previously Playwright only ran at the dev → main promotion
# gate, so a PR-against-dev could land breaking tests and the failure wouldn't
# surface until the next prod-promotion PR (sometimes days later, across many
# commits). Running Playwright on every dev-targeting PR catches regressions
# at the smallest possible blast radius.
#
# Scope: chromium project only (firefox/webkit/mobile remain in playwright.config
# for local use, but CI runs only chromium for speed).
#
# Visual tests (tests/visual.spec.ts) are EXCLUDED from CI because Playwright
# screenshot baselines are OS-specific (font rendering, anti-aliasing). Baselines
# are captured on darwin during local dev. Running them on ubuntu-latest needs
# linux baselines that we deliberately don't maintain — the visual suite is a
# local design-QA tool, not a cross-OS regression gate.
#
# To regenerate visual baselines after intentional UI changes (local only):
#   npx playwright test --project=chromium --update-snapshots tests/visual.spec.ts
# then commit the updated tests/visual.spec.ts-snapshots/*.png files.

on:
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  NODE_VERSION: '20'

jobs:
  playwright:
    runs-on: ubuntu-latest
    name: Playwright (chromium)
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js (static export)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run Playwright tests (excluding visual baselines — OS-specific)
        run: npx playwright test --project=chromium --grep-invert "Visual Tests"
        # On failure, the per-test screenshots and traces are still on the
        # runner. Re-run locally with `npx playwright test --project=chromium`
        # to reproduce. If you want to archive playwright-report/ in CI, add
        # actions/upload-artifact here with a SHA-pinned version that matches
        # the repo's CODEOWNERS-approved set.
